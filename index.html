<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Immersive VR Theater - Experience videos on a stunning 180-degree curved display with driving mode">
    <title>VR Theater - Immersive Experience</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <h1>VR THEATER</h1>
            <p>Initializing immersive experience...</p>
        </div>
    </div>

    <!-- VR Scene -->
    <a-scene id="vrScene" vr-mode-ui="enabled: true">
        <!-- Assets -->
        <a-assets>
            <video id="videoPlayer" 
                   src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
                   preload="auto" 
                   loop 
                   crossorigin="anonymous"></video>
        </a-assets>

        <!-- Camera Rig -->
        <a-entity id="cameraRig" position="0 1.6 0">
            <a-camera id="mainCamera">
                <!-- HUD Container -->
                <a-entity id="hudContainer" position="0 0 -0.5">
                    <!-- Mode Indicator -->
                    <a-text id="modeIndicator" 
                            value="VIDEO MODE" 
                            position="-0.4 0.3 0"
                            color="#00ffff"
                            align="center"
                            width="0.8"
                            font="mozillavr"></a-text>
                </a-entity>
            </a-camera>
        </a-entity>

        <!-- Curved Screen (180 degrees) -->
        <a-entity id="curvedScreen" position="0 1.6 -5" rotation="0 0 0">
            <a-curvedimage 
                id="videoScreen"
                src="#videoPlayer" 
                height="4" 
                radius="6" 
                theta-length="180"
                theta-start="-90"
                opacity="1"></a-curvedimage>
        </a-entity>

        <!-- Steering Wheel (Hidden by default) -->
        <a-entity id="steeringWheel" position="0 0.9 -0.6" rotation="0 0 0" visible="false">
            <!-- Steering Wheel Rim -->
            <a-torus 
                color="#1a1a1a" 
                radius="0.25" 
                radius-tubular="0.02"
                rotation="90 0 0"></a-torus>
            
            <!-- Steering Wheel Spokes -->
            <a-box color="#2a2a2a" width="0.01" height="0.3" depth="0.01" rotation="90 0 0"></a-box>
            <a-box color="#2a2a2a" width="0.3" height="0.01" depth="0.01" rotation="90 0 0"></a-box>
            
            <!-- Center Hub -->
            <a-cylinder 
                color="#ff6b35" 
                radius="0.06" 
                height="0.02"
                rotation="90 0 0"></a-cylinder>
            
            <a-text 
                value="DRIVE" 
                position="0 0 0.05"
                rotation="90 0 0"
                color="#ffffff"
                align="center"
                width="0.4"></a-text>
        </a-entity>

        <!-- Left Side Menu Panel -->
        <a-entity id="menuPanel" position="-2.5 1.6 -2" rotation="0 30 0">
            <!-- Menu Background -->
            <a-plane 
                color="#0a0a0a" 
                width="0.8" 
                height="2" 
                opacity="0.85"
                shader="flat"></a-plane>
            
            <!-- Menu Border -->
            <a-plane 
                color="#00ffff" 
                width="0.82" 
                height="2.02" 
                position="0 0 -0.01"
                opacity="0.3"
                shader="flat"></a-plane>
            
            <!-- Menu Title -->
            <a-text 
                value="CONTROL PANEL" 
                position="0 0.85 0.01"
                color="#00ffff"
                align="center"
                width="1.2"></a-text>
            
            <!-- Video Mode Button -->
            <a-entity id="videoModeBtn" position="0 0.4 0.01" class="menu-button">
                <a-plane 
                    color="#00ffff" 
                    width="0.6" 
                    height="0.25"
                    class="button-bg"
                    shader="flat"></a-plane>
                <a-text 
                    value="VIDEO MODE" 
                    position="0 0 0.01"
                    color="#000000"
                    align="center"
                    width="1"></a-text>
            </a-entity>
            
            <!-- Driving Mode Button -->
            <a-entity id="drivingModeBtn" position="0 0 0.01" class="menu-button">
                <a-plane 
                    color="#2a2a2a" 
                    width="0.6" 
                    height="0.25"
                    class="button-bg"
                    shader="flat"></a-plane>
                <a-text 
                    value="DRIVING MODE" 
                    position="0 0 0.01"
                    color="#00ffff"
                    align="center"
                    width="1"></a-text>
            </a-entity>
            
            <!-- Play/Pause Button -->
            <a-entity id="playPauseBtn" position="0 -0.4 0.01" class="menu-button">
                <a-plane 
                    color="#1a1a1a" 
                    width="0.6" 
                    height="0.25"
                    shader="flat"></a-plane>
                <a-text 
                    id="playPauseText"
                    value="PLAY" 
                    position="0 0 0.01"
                    color="#00ff00"
                    align="center"
                    width="1"></a-text>
            </a-entity>
            
            <!-- Enter VR Button -->
            <a-entity id="enterVRBtn" position="0 -0.8 0.01" class="menu-button">
                <a-plane 
                    color="#ff6b35" 
                    width="0.6" 
                    height="0.25"
                    shader="flat"></a-plane>
                <a-text 
                    value="ENTER VR" 
                    position="0 0 0.01"
                    color="#ffffff"
                    align="center"
                    width="1"></a-text>
            </a-entity>
        </a-entity>

        <!-- Environment -->
        <a-sky color="#050510"></a-sky>
        
        <!-- Ambient Lighting -->
        <a-entity light="type: ambient; color: #445; intensity: 0.4"></a-entity>
        <a-entity light="type: point; color: #00ffff; intensity: 0.3; distance: 10" position="-2.5 2 -2"></a-entity>
        
        <!-- Floor Grid -->
        <a-plane 
            position="0 0 0" 
            rotation="-90 0 0" 
            width="20" 
            height="20" 
            color="#0a0a1a"
            shader="flat"></a-plane>
    </a-scene>

    <script src="main.js"></script>
</body>
</html>
